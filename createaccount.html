<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Vodafone Giga TV – Complete Your Order</title>

  <!-- =========================================================
       1) ONETRUST REQUIRED SCRIPTS
       ✅ UNCHANGED
  ========================================================== -->
  <script>
    window.OtSdk = window.OtSdk || function () {
      (OtSdk.q = OtSdk.q || []).push(arguments);
    };
  </script>

  <script
    src="https://privacyportaltrial.onetrust.com/consent-embedded-forms/consent-receipt-scripts/OtFormStub.js"
    data-id="89af9315-196c-45ad-88ea-1b8ec3fe5a51"
    worker="https://consent-api.onetrust.com"
  ></script>

  <style>
    /* =========================================================
       VODAFONE BRAND SYSTEM
    ========================================================== */

    :root {
      --vf-red: #e60000;
      --vf-red-dark: #b30000;
      --vf-red-soft: #ffebeb;
      --vf-charcoal: #2b2b2b;
      --vf-charcoal-soft: #5a5a5a;
      --white: #ffffff;
      --surface: #ffffff;
      --surface-2: #f7f7f7;
      --border: #e2e2e2;

      --shadow-xl: 0 30px 80px rgba(0,0,0,0.18);
      --shadow-lg: 0 18px 44px rgba(0,0,0,0.14);
      --shadow-md: 0 10px 26px rgba(0,0,0,0.10);

      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;

      --max: 1400px;

      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--vf-charcoal);
      background:
        radial-gradient(circle at top left, rgba(230,0,0,0.10), transparent 28%),
        linear-gradient(180deg, #ffffff 0%, #f7f7f7 100%);
    }

    .page-shell {
      max-width: var(--max);
      margin: 0 auto;
    }

    /* =========================================================
       FRAME
    ========================================================== */
    .tv-frame {
      border-radius: 36px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: var(--shadow-xl);
    }

    /* =========================================================
       HERO
    ========================================================== */
    .app-hero {
      padding: 32px;
      color: white;
      background: linear-gradient(135deg, var(--vf-red), var(--vf-red-dark));
    }

    .hero-topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .brand-row {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: white;
      color: var(--vf-red);
      font-weight: 800;
      display: grid;
      place-items: center;
    }

    .brand-name {
      font-weight: 700;
      font-size: 16px;
    }

    .hero-content {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 24px;
    }

    .hero-copy h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 3vw, 3rem);
    }

    .hero-copy p {
      margin: 0;
      opacity: 0.92;
      line-height: 1.6;
    }

    /* =========================================================
       BODY LAYOUT
    ========================================================== */
    .app-body {
      display: grid;
      grid-template-columns: minmax(0,1.2fr) 380px;
      gap: 24px;
      padding: 24px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
    }

    .panel-inner {
      padding: 22px;
    }

    .panel-accent {
      border-color: var(--vf-red);
      background: linear-gradient(180deg, var(--vf-red-soft), #fff);
    }

    .section-kicker {
      font-size: 12px;
      font-weight: 700;
      color: var(--vf-red);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .section-heading h2 {
      margin: 0 0 8px;
      font-size: 1.3rem;
    }

    .section-copy {
      font-size: 14px;
      color: var(--vf-charcoal-soft);
      margin-bottom: 16px;
    }

    /* =========================================================
       FIELDS
    ========================================================== */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input {
      padding: 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      font: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--vf-red);
      box-shadow: 0 0 0 3px rgba(230,0,0,0.18);
    }

    /* =========================================================
       SUMMARY
    ========================================================== */
    .summary-panel {
      position: sticky;
      top: 18px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }

    .summary-inner {
      padding: 22px;
    }

    .summary-feature {
      border-radius: 22px;
      padding: 18px;
      background: linear-gradient(135deg, var(--vf-red), var(--vf-red-dark));
      color: white;
      margin-bottom: 16px;
    }

    .summary-list {
      display: grid;
      gap: 10px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      border-radius: 16px;
      background: #f7f7f7;
    }

    /* =========================================================
       RESPONSIVE
    ========================================================== */
    @media (max-width: 1100px) {
      .app-body { grid-template-columns: 1fr; }
      .summary-panel { position: static; }
      .hero-content { grid-template-columns: 1fr; }
    }
  </style>
</head>
