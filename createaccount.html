    :root {

    html, body {

    }

    /* ── Header ── */
    header.top-bar {
      position: sticky;
      top: 0;
      z-index: 100;

    .top-bar-inner {
      display: flex;
      align-items: center;
      height: 68px;
      padding: 0 32px;
      gap: 16px;
    }

    .logo-link {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      flex-shrink: 0;
    }

    .vodafone-logo { height: 32px; width: auto; }

    .brand-divider {
      width: 1px;
      height: 26px;
      background: rgba(255,255,255,0.18);
    }

    .brand-subtitle {

      letter-spacing: -0.3px;
    }

    .back-link {

      gap: 6px;
      color: var(--vf-text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      margin-left: auto;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--vf-text); }
    .back-link svg { width: 16px; height: 16px; fill: currentColor; }

    /* ── Page layout ── */
    .page-wrapper {
      min-height: calc(100vh - 68px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 56px 24px 80px;
      background: radial-gradient(ellipse at 70% 0%, rgba(230,0,0,0.06) 0%, transparent 55%);

    .card {
      background: var(--vf-bg-card);
      border: 1px solid var(--vf-border);
      border-radius: 14px;
      padding: 48px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .card-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--vf-red);
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      line-height: 1.05;
    }

    .card-subtitle {
      font-size: 14px;

      margin-bottom: 36px;
      line-height: 1.6;
    }

    .section-label {

      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--vf-text-muted);
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--vf-border);

    .divider {
      height: 1px;
      background: var(--vf-border);
      margin: 32px 0;
    }

    .card-footer {
      text-align: center;
      font-size: 13px;
      color: var(--vf-text-muted);

    .card-footer a {
      color: var(--vf-red);

      margin-bottom: 8px !important;
      display: block !important;
      letter-spacing: 0.2px !important;

      margin-bottom: 16px !important;
      -webkit-appearance: none !important;
      appearance: none !important;
      box-shadow: none !important;

    #ot-container input[type="text"]:focus,
    #ot-container input[type="email"]:focus,
    #ot-container input[type="tel"]:focus,
    #ot-container select:focus {
      border-color: var(--vf-red) !important;
    }

    #ot-container input::placeholder {
      color: rgba(255,255,255,0.22) !important;
    }

    /* Checkbox — hide native, style label */
    #ot-container input[type="checkbox"] {
      position: absolute !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    #ot-container .otwf-chkbox {
      margin-bottom: 14px !important;
      padding: 14px 16px !important;
      background: rgba(230,0,0,0.05) !important;
      border: 1px solid rgba(230,0,0,0.15) !important;
      border-radius: var(--vf-radius) !important;
    }

    #ot-container .otwf-chkbox label {
      display: flex !important;
      align-items: flex-start !important;
      gap: 12px !important;
      cursor: pointer !important;
      font-size: 13px !important;
      font-weight: 400 !important;
      color: var(--vf-text-muted) !important;
      margin-bottom: 0 !important;
      line-height: 1.6 !important;
      position: relative !important;
    }

    #ot-container .otwf-chkbox label::before {
      content: "" !important;
      width: 20px !important;
      height: 20px !important;
      min-width: 20px !important;
      border-radius: 50% !important;
      border: 2px solid rgba(255,255,255,0.2) !important;
      background: var(--vf-bg-light) !important;
      transition: all 0.15s ease !important;
      margin-top: 1px !important;
      flex-shrink: 0 !important;
    }

    #ot-container input[type="checkbox"]:checked + label::before {
      border-color: var(--vf-red) !important;
      background: radial-gradient(circle at center, var(--vf-red) 45%, transparent 47%) !important;
      box-shadow: 0 0 0 3px rgba(230,0,0,0.2) !important;
    }

    #ot-container input[type="checkbox"]:focus + label::before {
      box-shadow: 0 0 0 3px rgba(230,0,0,0.2) !important;
    }

    /* Error */
    .ot-error {
      color: #ff6b6b !important;
      font-size: 13px !important;

    /* Submit button */
    .ot-submit {

    .ot-submit:hover {

    /* Responsive */

      .card { padding: 28px 20px; }
      .page-wrapper { padding: 32px 16px 60px; }
      .top-bar-inner { padding: 0 16px; }
    }
  </style>

  <script>
    /* Collection Point ID — separate from the script data-id above */
    const CP_ID = "cbc1219e-ed04-41b3-b4f0-1e9a71740089";

    function whenOTReady(callback) {
      const timer = setInterval(() => {
        if (window.OneTrust && window.OneTrust.webform && window.OneTrust.webform.InstallCP) {
