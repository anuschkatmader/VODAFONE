<!-- Description: Simple demo page for a OneTrust Embedded Form workshop (basic HTML attributes are displayed at the top for training purposes, and the consent form is loaded automatically at the bottom using InstallCP so users can clearly identify the key OneTrust elements). -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>OneTrust Embedded Form Demo</title>

  <!-- =========================================================
       1) ONETRUST REQUIRED SCRIPTS
       These scripts are required for the embedded OneTrust form.
       For workshop purposes:
       - Leave this section as-is
       - Think of it as the "OneTrust loader"
       - Make sure to replace with your own ID's (from your trial environment)
  ========================================================== -->

  <!-- Required OneTrust bootstrap -->
  <script>
    window.OtSdk = window.OtSdk || function () {
      (OtSdk.q = OtSdk.q || []).push(arguments);
    };
  </script>

  <!-- OneTrust embedded form library -->
  <script
    src="https://privacyportaltrial.onetrust.com/consent-embedded-forms/consent-receipt-scripts/OtFormStub.js"
    data-id="89af9315-196c-45ad-88ea-1b8ec3fe5a51"
    worker="https://consent-api.onetrust.com"
  ></script>

  <!-- =========================================================
       2) PAGE STYLES
       This section only controls how the page looks.
       It does NOT load the OneTrust form.
  ========================================================== -->
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #111;
      --muted: #666;
      --primary: #2563eb;
      --border: #e5e7eb;
      --danger: #d9534f;
      --radius: 12px;
      --font: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 16px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 800;
    }

    .sub {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .section-title {
      margin: 24px 0 10px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      margin: 0 0 6px;
      font-weight: 600;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font: inherit;
      background: #fff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .demo-box {
      margin-top: 8px;
      padding: 16px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: #fafafa;
    }

    /* =========================================================
       ONETRUST CONTAINER
       This is where OneTrust will render the consent form.
       The JS will target this exact element.
  ========================================================== */
    #ot-container {
      margin-top: 18px;
    }

    /* =========================================================
       OPTIONAL ONETRUST VISUAL CLEANUP
       These styles make the OneTrust form look simpler for demos.
       They do not change the functional behavior.
  ========================================================== */
    .ot-consent-inline,
    .otwf-content,
    .ot-form,
    .ot-form-content,
    .ot-el {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      font-family: inherit !important;
      color: inherit !important;
    }

    #ot-container .ot-label,
    #ot-container label,
    #ot-container span.ot-label {
      font-size: 14px !important;
      line-height: 1.5 !important;
      font-weight: 400 !important;
      color: var(--muted) !important;
    }

    #ot-container input[type="checkbox"] {
      position: absolute !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    #ot-container .otwf-chkbox label {
      display: flex !important;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      position: relative;
    }

    #ot-container .otwf-chkbox label::before {
      content: "";
      width: 18px;
      height: 18px;
      min-width: 18px;
      border-radius: 50%;
      border: 2px solid var(--border);
      margin-top: 2px;
      transition: all 0.15s ease;
      background: #fff;
    }

    #ot-container input[type="checkbox"]:checked + label::before {
      border-color: var(--primary);
      background: radial-gradient(circle at center, var(--primary) 45%, transparent 47%);
    }

    #ot-container input[type="checkbox"]:focus + label::before {
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    .ot-error {
      color: var(--danger) !important;
      font-size: 13px !important;
      margin-top: 4px !important;
    }

    .ot-submit {
      width: 100% !important;
      margin-top: 16px !important;
      padding: 14px !important;
      border-radius: var(--radius) !important;
      border: 1px solid var(--border) !important;
      background: #fff !important;
      color: var(--text) !important;
      font-weight: 700 !important;
      cursor: pointer !important;
    }

    .ot-submit:hover {
      background: #f9f9f9 !important;
    }

    @media (max-width: 640px) {
      .field-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <!-- =========================================================
       3) PAGE HTML
       This is the visible page content.
       We show:
       - Simple HTML fields first
       - The OneTrust container at the bottom
  ========================================================== -->
  <section class="card">
    <h1>Embedded Form Demo</h1>
    <p class="sub">
      This page shows standard HTML fields first and the OneTrust embedded consent form underneath.
    </p>

    <!-- Standard HTML fields -->
    <div class="section-title">Example HTML Fields</div>

    <div class="field-grid">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="John Smith" />
      </div>

      <div class="field">
        <label for="nationality">Nationality</label>
        <input id="nationality" type="text" placeholder="Spanish" />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <!-- Keep this ID as requested -->
        <input id="email" type="email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="country">Country</label>
        <input id="country" type="text" placeholder="Spain" />
      </div>

      <div class="field full">
        <label for="notes">Additional Notes</label>
        <input id="notes" type="text" placeholder="Extra attribute for the demo" />
      </div>
    </div>

    <!-- OneTrust area -->
    <div class="section-title">OneTrust Embedded Form</div>

    <div class="demo-box">
      <div class="hint">
        This box contains the <strong>OneTrust target container</strong>.  
        The consent form will be inserted here automatically using <strong>InstallCP()</strong>.
      </div>

      <!-- IMPORTANT:
           OneTrust renders the consent form inside this div -->
      <div id="ot-container"></div>
    </div>
  </section>

  <!-- =========================================================
       4) PAGE JAVASCRIPT
       This section controls the behavior.
       For the workshop, the key idea is:
       - Wait until OneTrust is ready
       - Call InstallCP()
       - Mount the form into #ot-container
  ========================================================== -->
  <script>
    /* The Consent Profile ID to load */
    const CP_ID = "cbc1219e-ed04-41b3-b4f0-1e9a71740089";

    /* Wait until the OneTrust library is fully available */
    function whenOTReady(callback) {
      const timer = setInterval(() => {
        if (window.OneTrust && window.OneTrust.webform && window.OneTrust.webform.InstallCP) {
          clearInterval(timer);
          callback();
        }
      }, 80);
    }

    /* When the page is ready, load the OneTrust form automatically */
    window.addEventListener("DOMContentLoaded", () => {
      whenOTReady(() => {
        OneTrust.webform.InstallCP(CP_ID, {
          target: "#ot-container"
        });
      });
    });
  </script>
</body>
</html>
``
